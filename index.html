<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Aulas - TPF 43M</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #ffffff; margin-bottom: 20px; font-weight: 300; letter-spacing: 1px; text-align: center; }
        .container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 600px; }
        
        /* Estilos da barra de pesquisa */
        .search-box {
            background-color: #1e1e1e;
            padding: 15px 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            margin-bottom: 20px;
            border-left: 5px solid #ff9800;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .search-box label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; }
        .search-box select {
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444;
            background-color: #2c2c2c; color: white; font-size: 1em;
        }

        /* Estilos dos Cards Padrão */
        .card { background-color: #1e1e1e; border-left: 5px solid #4caf50; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card.past { border-left-color: #888; opacity: 0.8; }
        .card.today { border-left-color: #e91e63; background-color: #2a1b20; transform: scale(1.02); }
        .card.next { border-left-color: #2196f3; }
        .status { font-size: 0.85em; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: bold; }
        .past .status { color: #aaaaaa; }
        .today .status { color: #ff4081; }
        .next .status { color: #64b5f6; }
        .date { font-size: 1.2em; margin-bottom: 5px; color: #fff; }
        .details { font-size: 1em; color: #cccccc; line-height: 1.5; }
        .highlight { font-weight: bold; color: #ffffff; }

        /* Estilos da Lista de Pesquisa */
        .uc-title { color: #ff9800; font-size: 1.1em; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .lista-aulas { list-style: none; padding: 0; margin: 0; }
        .lista-aulas li { 
            padding: 12px 10px; 
            border-bottom: 1px solid #2a2a2a; 
            display: flex; 
            flex-direction: column; 
            gap: 4px;
        }
        .lista-aulas li:last-child { border-bottom: none; }
        .lista-aulas li.passada { opacity: 0.6; }
        .lista-aulas li.proxima { 
            background-color: #2a1b20; 
            border-left: 4px solid #e91e63; 
            padding-left: 15px;
            border-radius: 0 4px 4px 0;
            margin: 10px 0;
        }
        .badge-proxima { color: #e91e63; font-size: 0.8em; font-weight: bold; text-transform: uppercase; margin-left: 10px; }
        .aula-docente { font-size: 0.9em; color: #aaa; }
    </style>
</head>

        // Adicionada a chave 'codigoUC' para facilitar o filtro
        const aulas = rawAulas.map(linha => {
            const [data, uc, docente, aula] = linha.split('|');
            return {
                data: data,
                codigoUC: uc,
                uc: `${uc} - ${nomesUC[uc] || ''}`,
                docente: docente,
                aula: aula
            };
        });

        // Pega data atual formatada
        const hoje = new Date();
        const offset = hoje.getTimezoneOffset() * 60000;
        const dataHojeStr = (new Date(hoje - offset)).toISOString().split('T')[0];

        function formatarDataBR(dataISO) {
            const [ano, mes, dia] = dataISO.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        // Função para popular o Select com as UCs disponíveis
        function popularSelect() {
            const select = document.getElementById('filtroUC');
            for (const [codigo, nome] of Object.entries(nomesUC)) {
                const option = document.createElement('option');
                option.value = codigo;
                option.textContent = `${codigo} - ${nome}`;
                select.appendChild(option);
            }
        }

        // Event Listener para quando o usuário seleciona uma UC
        document.getElementById('filtroUC').addEventListener('change', function(e) {
            const ucSelecionada = e.target.value;
            const painelGeral = document.getElementById('painel');
            const painelPesquisa = document.getElementById('resultado-pesquisa');

            if (!ucSelecionada) {
                // Se voltar pro "Selecione", mostra o painel normal e esconde a pesquisa
                painelPesquisa.style.display = 'none';
                painelGeral.style.display = 'flex';
                return;
            }

            // Esconde o painel normal e mostra o da pesquisa
            painelGeral.style.display = 'none';
            painelPesquisa.style.display = 'flex';

            const aulasDaUC = aulas.filter(a => a.codigoUC === ucSelecionada);
            
            let html = `<div class="card" style="border-left-color: #ff9800;">
                            <div class="uc-title">${nomesUC[ucSelecionada]}</div>
                            <ul class="lista-aulas">`;
            
            let encontrouProxima = false;

            aulasDaUC.forEach(aula => {
                let liClass = "";
                let badge = "";

                // Verifica se é a aula de hoje ou a mais próxima no futuro
                if (aula.data >= dataHojeStr && !encontrouProxima) {
                    liClass = "proxima";
                    badge = `<span class="badge-proxima">🎯 Próxima Aula</span>`;
                    encontrouProxima = true;
                } else if (aula.data < dataHojeStr) {
                    liClass = "passada";
                }

                html += `
                    <li class="${liClass}">
                        <div><span style="font-size: 1.1em; font-weight: bold; color: #fff;">${formatarDataBR(aula.data)}</span> ${badge}</div>
                        <div class="aula-docente">Prof: <strong>${aula.docente}</strong> | Aula ${aula.aula}</div>
                    </li>
                `;
            });

            if (aulasDaUC.length === 0) {
                html += `<li>Nenhuma aula programada para esta UC.</li>`;
            }

            html += `</ul></div>`;
            painelPesquisa.innerHTML = html;
        });

        // Função Original (Renderiza o painel inicial)
        function renderizarGeral() {
            let ultimaAula = null;
            let aulaHoje = null;
            let proximaAula = null;

            for (let aula of aulas) {
                if (aula.data < dataHojeStr) {
                    ultimaAula = aula;
                } else if (aula.data === dataHojeStr) {
                    aulaHoje = aula;
                } else if (aula.data > dataHojeStr && !proximaAula) {
                    proximaAula = aula;
                }
            }

            const painel = document.getElementById('painel');
            let html = '';

            if (ultimaAula) {
                html += `
                <div class="card past">
                    <div class="status">Última Aula</div>
                    <div class="date">${formatarDataBR(ultimaAula.data)}</div>
                    <div class="details">
                        <span class="highlight">${ultimaAula.uc}</span><br>
                        Docente: ${ultimaAula.docente} | Aula ${ultimaAula.aula}
                    </div>
                </div>`;
            }

            if (aulaHoje) {
                html += `
                <div class="card today">
                    <div class="status">🔥 Hoje</div>
                    <div class="date">${formatarDataBR(aulaHoje.data)}</div>
                    <div class="details">
                        <span class="highlight">${aulaHoje.uc}</span><br>
                        Docente: ${aulaHoje.docente} | Aula ${aulaHoje.aula}
                    </div>
                </div>`;
            } else {
                html += `
                <div class="card today" style="background-color: #1e1e1e; border-color: #444;">
                    <div class="status" style="color: #aaa;">Hoje</div>
                    <div class="details">Sem aulas programadas para hoje!</div>
                </div>`;
            }

            if (proximaAula) {
                html += `
                <div class="card next">
                    <div class="status">Próxima Aula</div>
                    <div class="date">${formatarDataBR(proximaAula.data)}</div>
                    <div class="details">
                        <span class="highlight">${proximaAula.uc}</span><br>
                        Docente: ${proximaAula.docente} | Aula ${proximaAula.aula}
                    </div>
                </div>`;
            }

            if (!proximaAula && !aulaHoje && ultimaAula && dataHojeStr > "2026-07-02") {
                 html += `
                <div class="card today" style="border-left-color: #ffd700;">
                    <div class="status" style="color: #ffd700;">🎉 Curso Finalizado</div>
                    <div class="details">Parabéns! Você concluiu o cronograma.</div>
                </div>`;
            }

            painel.innerHTML = html;
        }

        // Inicialização
        popularSelect();
        renderizarGeral();
    </script>
