        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #ffffff; margin-bottom: 20px; font-weight: 300; letter-spacing: 1px; text-align: center; }
        .container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 600px; }
        
        /* Estilos da barra de pesquisa */
        .search-box {
            background-color: #1e1e1e;
            padding: 15px 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            margin-bottom: 20px;
            border-left: 5px solid #ff9800;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .search-box label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; }
        .search-box select {
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444;
            background-color: #2c2c2c; color: white; font-size: 1em;
        }

        /* Estilos dos Cards Padrão */
        .card { background-color: #1e1e1e; border-left: 5px solid #4caf50; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card.past { border-left-color: #888; opacity: 0.7; }
        .card.today { border-left-color: #e91e63; background-color: #2a1b20; transform: scale(1.02); }
        .card.next { border-left-color: #2196f3; }
        .status { font-size: 0.85em; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: bold; }
        .past .status { color: #aaaaaa; }
        .today .status { color: #ff4081; }
        .next .status { color: #64b5f6; }
        .date { font-size: 1.2em; margin-bottom: 5px; color: #fff; }
        .details { font-size: 1em; color: #cccccc; line-height: 1.5; }
        .highlight { font-weight: bold; color: #ffffff; }

        .titulo-semana {
            color: #fff;
            border-bottom: 2px solid #4caf50;
            padding-bottom: 10px;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        /* Estilos da Lista de Pesquisa */
        .uc-title { color: #ff9800; font-size: 1.1em; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .lista-aulas { list-style: none; padding: 0; margin: 0; }
        .lista-aulas li { 
            padding: 12px 10px; 
            border-bottom: 1px solid #2a2a2a; 
            display: flex; 
            flex-direction: column; 
            gap: 4px;
        }
        .lista-aulas li:last-child { border-bottom: none; }
        .lista-aulas li.passada { opacity: 0.5; }
        .lista-aulas li.proxima { 
            background-color: #1e2a38; 
            border-left: 4px solid #2196f3; 
            padding-left: 15px;
            border-radius: 0 4px 4px 0;
            margin: 10px 0;
        }
        .badge-proxima { color: #64b5f6; font-size: 0.8em; font-weight: bold; text-transform: uppercase; margin-left: 10px; }
        .badge-hoje { color: #ff4081; font-size: 0.8em; font-weight: bold; text-transform: uppercase; margin-left: 10px; }
        .aula-docente { font-size: 0.9em; color: #aaa; }

        /* Badge de UC Encerrada */
        .uc-encerrada {
            background-color: #1b2a20;
            color: #4caf50;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 1px solid #4caf50;
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }
    </style>
</head>

                docente: docente,

            };

        // Retorna a string no formato YYYY-MM-DD
        function toISODate(d) {
            const ano = d.getFullYear();
            const mes = String(d.getMonth() + 1).padStart(2, '0');
            const dia = String(d.getDate()).padStart(2, '0');
            return `${ano}-${mes}-${dia}`;
        }

        // Função para formatação visual (ex: 14/04/2025)
        function formatarDataBR(dataISO) {
            const [ano, mes, dia] = dataISO.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        // Converte a data (YYYY-MM-DD) para o nome do dia da semana
        function getDiaDaSemana(dataISO) {
            const partes = dataISO.split('-');
            const data = new Date(partes[0], partes[1] - 1, partes[2], 12, 0, 0); // Define 12h para evitar fuso
            const dias = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
            return dias[data.getDay()];
        }

        // Função usada EXCLUSIVAMENTE para a busca por UC (considerando o limite das 12h)
        function getStatusAulaPesquisa(dataAula) {
            const agora = new Date();
            const hojeStr = toISODate(agora);

            if (dataAula < hojeStr) {
                return "passada";
            } else if (dataAula === hojeStr) {
                if (agora.getHours() >= 12) {
                    return "passada"; 
                } else {
                    return "hoje"; 
                }
            } else {
                return "futura";
            }
        }

            for (const [codigo, nome] of Object.entries(nomesUC)) {

                option.value = codigo;
                option.textContent = `${codigo} - ${nome}`;
                select.appendChild(option);
            }
        }

        // Evento de pesquisa por UC
        document.getElementById('filtroUC').addEventListener('change', function(e) {
            const ucSelecionada = e.target.value;
            const painelGeral = document.getElementById('painel');
            const painelPesquisa = document.getElementById('resultado-pesquisa');

            if (!ucSelecionada) {
                painelPesquisa.style.display = 'none';
                painelGeral.style.display = 'flex';
                return;
            }

            painelGeral.style.display = 'none';
            painelPesquisa.style.display = 'flex';

            const aulasDaUC = aulas.filter(a => a.codigoUC === ucSelecionada);
            
            // Usa o status restrito por horário aqui
            const todasEncerradas = aulasDaUC.every(aula => getStatusAulaPesquisa(aula.data) === "passada");

            let html = `<div class="card" style="border-left-color: #ff9800;">
                            <div class="uc-title">${nomesUC[ucSelecionada]}</div>`;
            
            if (todasEncerradas && aulasDaUC.length > 0) {
                html += `<div class="uc-encerrada">✅ UC Encerrada para a Turma 43M</div>`;
            }

            html += `<ul class="lista-aulas">`;
            
            let encontrouProxima = false;

            aulasDaUC.forEach(aula => {
                const status = getStatusAulaPesquisa(aula.data);
                let liClass = "";
                let badge = "";

                if (status === "passada") {
                    liClass = "passada";
                } else if ((status === "hoje" || status === "futura") && !encontrouProxima) {
                    liClass = "proxima";
                    badge = status === "hoje" ? `<span class="badge-hoje">🔥 Hoje</span>` : `<span class="badge-proxima">🎯 Próxima Aula</span>`;
                    encontrouProxima = true;
                }

                html += `
                    <li class="${liClass}">
                        <div><span style="font-size: 1.1em; font-weight: bold; color: #fff;">${formatarDataBR(aula.data)}</span> ${badge}</div>
                        <div class="aula-docente">Prof: <strong>${aula.docente}</strong> | Aula ${aula.aula}</div>
                    </li>
                `;
            });

            if (aulasDaUC.length === 0) {
                html += `<li>Nenhuma aula programada para esta UC.</li>`;
            }

            html += `</ul></div>`;
            painelPesquisa.innerHTML = html;

        // Renderiza o Painel Geral Principal (Focado na Semana Atual)
        function renderizarSemanaAtual() {
            const agora = new Date();
            const hojeStr = toISODate(agora);

            const diaDaSemana = agora.getDay(); // 0 = Dom, 1 = Seg ... 6 = Sáb
            // Se hoje for domingo (0), a segunda-feira desta semana foi a 6 dias atrás.
            // Para outros dias, a diferença até segunda é: 1 - diaDaSemana
            const diferencaParaSegunda = (diaDaSemana === 0) ? -6 : 1 - diaDaSemana;
            
            const dataSegunda = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate() + diferencaParaSegunda);
            // Considerando as aulas de segunda a quinta (adiciona 3 dias à segunda-feira)
            // Vou estender o filtro para a sexta-feira (+4) caso tenha alguma aula extra / reposição
            const dataFimDaSemana = new Date(dataSegunda.getFullYear(), dataSegunda.getMonth(), dataSegunda.getDate() + 4); 

            const strSegunda = toISODate(dataSegunda);
            const strFimDaSemana = toISODate(dataFimDaSemana);

            // Filtra as aulas que caem dentro da semana atual
            const aulasDaSemana = aulas.filter(a => a.data >= strSegunda && a.data <= strFimDaSemana);
            
            const painel = document.getElementById('painel');
            let html = '<div class="titulo-semana">Aulas desta Semana</div>';

            // Verifica se o curso inteiro já acabou baseado na data de hoje
            if (hojeStr > "2026-07-02") {
                html += `
                <div class="card today" style="border-left-color: #ffd700;">
                    <div class="status" style="color: #ffd700;">🎉 Curso Finalizado</div>
                    <div class="details">Parabéns! Vocês concluíram o cronograma.</div>
                </div>`;
            } else if (aulasDaSemana.length === 0) {
                html += `
                <div class="card" style="border-color: #444;">
                    <div class="details" style="text-align: center;">Não há aulas programadas para esta semana (Seg a Qui).</div>
                </div>`;
            } else {
                aulasDaSemana.forEach(aula => {
                    const diaNome = getDiaDaSemana(aula.data);
                    
                    if (aula.data === hojeStr) {
                        // Destaque de Hoje Livre do Limite de Horário
                        html += `
                        <div class="card today">
                            <div class="status">🔥 Hoje - ${diaNome}</div>
                            <div class="date">${formatarDataBR(aula.data)}</div>
                            <div class="details">
                                <span class="highlight">${aula.uc}</span><br>
                                Docente: ${aula.docente} | Aula ${aula.aula}
                            </div>
                        </div>`;
                    } else if (aula.data < hojeStr) {
                        // Aula que já ocorreu nesta mesma semana
                        html += `
                        <div class="card past">
                            <div class="status">✅ Concluída - ${diaNome}</div>
                            <div class="date">${formatarDataBR(aula.data)}</div>
                            <div class="details">
                                <span class="highlight">${aula.uc}</span><br>
                                Docente: ${aula.docente} | Aula ${aula.aula}
                            </div>
                        </div>`;
                    } else {
                        // Aula que ainda vai ocorrer nesta semana
                        html += `
                        <div class="card next">
                            <div class="status">⏳ Programada - ${diaNome}</div>
                            <div class="date">${formatarDataBR(aula.data)}</div>
                            <div class="details">
                                <span class="highlight">${aula.uc}</span><br>
                                Docente: ${aula.docente} | Aula ${aula.aula}
                            </div>
                        </div>`;
                    }
                });
            }

            painel.innerHTML = html;
        }

        popularSelect();
        renderizarSemanaAtual();
    </script>
</body>
</html>
