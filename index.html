<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Ponto</title>
    <style>
        /* Paleta Dark Mode */
        :root {
            --bg-color: #121212;
            --surface-color: #1E1E1E;
            --text-primary: #E0E0E0;
            --text-secondary: #9E9E9E;
            --header-bg: #0A0A0A;
            --card-shadow: rgba(0, 0, 0, 0.4);
            
            /* Cores SPTrans ajustadas para Dark Mode */
            --sp-verde: #8BC34A;
            --sp-laranja: #F37A20;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        header { 
            background-color: var(--header-bg); 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 4px 12px var(--card-shadow); 
            z-index: 10; 
        }
        header h1 { font-size: 24px; margin-bottom: 5px; font-weight: 600; letter-spacing: 0.5px; }
        header p { font-size: 14px; color: var(--text-secondary); }

        main { padding: 20px; flex-grow: 1; overflow-y: auto; }
        
        .status-msg { text-align: center; color: var(--text-secondary); font-size: 16px; margin-top: 50px; font-style: italic; }

        .bus-card {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 18px 16px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px var(--card-shadow);
            border-left: 8px solid #555; 
            transition: transform 0.2s ease;
        }

        .bus-card:active { transform: scale(0.98); }

        .bus-card.verde { border-left-color: var(--sp-verde); }
        .bus-card.laranja { border-left-color: var(--sp-laranja); }

        .bus-number { 
            font-size: 22px; 
            font-weight: 700; 
            color: #FFFFFF; 
            width: 100px; 
            letter-spacing: 0.5px;
        }
        .bus-dest { 
            font-size: 16px; 
            color: var(--text-secondary); 
            flex-grow: 1; 
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">Meu Ponto</h1>
        <p id="current-info">Verificando horário...</p>
    </header>

    <main>
        <div id="bus-list"></div>
    </main>

    <script>
        // Dados fixos com as cores reais das viações
        const linhasManha = [
            { numero: "8000-10", destino: "Terminal Lapa", cor: "verde" },
            { numero: "8400-10", destino: "Terminal Pirituba", cor: "verde" },
            { numero: "8549-10", destino: "Taipas", cor: "verde" },
            { numero: "8615-10", destino: "Parque da Lapa", cor: "laranja" },
            { numero: "8594-10", destino: "Cidade d'Abril", cor: "verde" }
        ];

        const linhasAlmoco = [
            { numero: "8622-10", destino: "Praça Ramos de Azevedo", cor: "verde" },
            { numero: "1896-10", destino: "Praça Ramos de Azevedo", cor: "verde" },
            { numero: "8000-1",  destino: "Praça Ramos de Azevedo", cor: "verde" },
            { numero: "8000-10", destino: "Praça Ramos de Azevedo", cor: "verde" },
            { numero: "8400-10", destino: "Praça Ramos de Azevedo", cor: "verde" },
            { numero: "8549-10", destino: "Praça do Correio", cor: "verde" },
            { numero: "8594-10", destino: "Praça Ramos de Azevedo", cor: "verde" },
            { numero: "8615-10", destino: "Term. Pq. Dom Pedro II", cor: "laranja" },
            { numero: "8677-10", destino: "Largo do Paissandú", cor: "verde" },
            { numero: "8686-10", destino: "Largo do Paissandú", cor: "verde" }
        ];

        function renderBuses(linhas) {
            const listContainer = document.getElementById('bus-list');
            listContainer.innerHTML = ''; // Limpa antes de injetar novos dados
            
            linhas.forEach(linha => {
                const card = document.createElement('div');
                card.className = `bus-card ${linha.cor}`; 
                
                card.innerHTML = `
                    <div class="bus-number">${linha.numero}</div>
                    <div class="bus-dest">${linha.destino}</div>
                `;
                listContainer.appendChild(card);
            });
        }

        // Lógica principal de roteamento de horários
        function processSchedule(day, hour) {
            const listContainer = document.getElementById('bus-list');
            const infoText = document.getElementById('current-info');
            const titleText = document.getElementById('app-title');

            // Segunda (1) a Quinta (4)
            if (day >= 1 && day <= 4) {
                if (hour >= 6 && hour < 9) {
                    titleText.innerText = "Sentido Lapa";
                    infoText.innerText = `Seg a Qui • 06h às 09h`;
                    renderBuses(linhasManha);
                } else if (hour >= 11 && hour < 13) {
                    titleText.innerText = "Sentido Centro";
                    infoText.innerText = `Seg a Qui • 11h às 13h`;
                    renderBuses(linhasAlmoco);
                } else {
                    titleText.innerText = "Fora de Rota";
                    infoText.innerText = `Aguardando próximo ciclo`;
                    listContainer.innerHTML = `<div class="status-msg">Nenhuma tabela de ônibus ativa neste horário.</div>`;
                }
            } else {
                titleText.innerText = "Modo Fim de Semana";
                infoText.innerText = "Sexta, Sábado ou Domingo";
                listContainer.innerHTML = `<div class="status-msg">Tabelas inativas fora de Seg-Qui.</div>`;
            }
        }

        // Captura a hora do sistema do celular
        function checkRealTimeSchedule() {
            const now = new Date();
            const currentDay = now.getDay();
            const currentHour = now.getHours();
            
            processSchedule(currentDay, currentHour);
        }

        // Roda a verificação assim que a página abre
        window.onload = checkRealTimeSchedule;

        // Mantém atualizando silenciosamente a cada 1 minuto (60000 ms)
        setInterval(checkRealTimeSchedule, 60000);
    </script>
</body>
</html>
