    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #ffffff; margin-bottom: 20px; font-weight: 300; letter-spacing: 1px; text-align: center; }
        .container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 600px; margin-bottom: 80px; }
        
        /* Estilos da barra de pesquisa */
        .search-box {
            background-color: #1e1e1e;
            padding: 15px 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            margin-bottom: 20px;
            border-left: 5px solid #ff9800;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .search-box label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; }
        .search-box select {
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444;
            background-color: #2c2c2c; color: white; font-size: 1em; outline: none;
        }

        /* Estilos dos Cards Padrão */
        .card { 
            background-color: #1e1e1e; 
            border-left: 5px solid #4caf50; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
        }
        .card.past { border-left-color: #888; opacity: 0.7; }
        .card.today { border-left-color: #e91e63; background-color: #2a1b20; transform: scale(1.02); }
        .card.today:hover { transform: scale(1.03); }
        .card.next { border-left-color: #2196f3; }
        
        .status { font-size: 0.85em; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: bold; }
        .past .status { color: #aaaaaa; }
        .today .status { color: #ff4081; }
        .next .status { color: #64b5f6; }
        .date { font-size: 1.2em; margin-bottom: 5px; color: #fff; }
        .details { font-size: 1em; color: #cccccc; line-height: 1.5; }
        .highlight { font-weight: bold; color: #ffffff; }

        /* Dica de clique no card */
        .click-hint {
            font-size: 0.8em;
            color: #777;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-style: italic;
        }

        .titulo-semana {
            color: #fff;
            border-bottom: 2px solid #4caf50;
            padding-bottom: 10px;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        /* Navegação do Rodapé (Semanas) */
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px 10px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
            z-index: 100;
            box-sizing: border-box;
        }
        .footer-nav-inner {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
        }
        .footer-nav button {
            background-color: #2c2c2c;
            color: #ccc;
            border: 1px solid #444;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.9em;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            margin: 0 5px;
            transition: all 0.3s;
        }
        .footer-nav button.active { background-color: #4caf50; color: white; border-color: #4caf50; }
        .footer-nav button:hover:not(.active) { background-color: #3c3c3c; }

        /* Estilos da Lista de Pesquisa */
        .uc-title { color: #ff9800; font-size: 1.1em; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .lista-aulas { list-style: none; padding: 0; margin: 0; }
        .lista-aulas li { 
            padding: 12px 10px; 
            border-bottom: 1px solid #2a2a2a; 
            display: flex; 
            flex-direction: column; 
            gap: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .lista-aulas li:hover { background-color: #2a2a2a; border-radius: 4px; }
        .lista-aulas li:last-child { border-bottom: none; }
        .lista-aulas li.passada { opacity: 0.6; }
        .lista-aulas li.proxima { 
            background-color: #1e2a38; 
            border-left: 4px solid #2196f3; 
            padding-left: 15px;
            border-radius: 0 4px 4px 0;
            margin: 10px 0;
        }
        .lista-aulas li.proxima:hover { background-color: #283747; }
        .badge-proxima { color: #64b5f6; font-size: 0.8em; font-weight: bold; text-transform: uppercase; margin-left: 10px; }
        .badge-hoje { color: #ff4081; font-size: 0.8em; font-weight: bold; text-transform: uppercase; margin-left: 10px; }
        .aula-docente { font-size: 0.9em; color: #aaa; }

        .uc-encerrada { background-color: #1b2a20; color: #4caf50; padding: 12px; text-align: center; font-weight: bold; border-radius: 4px; margin-bottom: 15px; border: 1px solid #4caf50; font-size: 0.9em; letter-spacing: 0.5px; }

        /* Estilos do Modal (Hover de Conteúdo) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(3px);
        }
        .modal-box {
            background: #1e1e1e;
            border-top: 5px solid #9c27b0;
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            position: relative;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            color: #888; font-size: 1.8em;
            cursor: pointer; line-height: 1;
        }
        .modal-close:hover { color: #fff; }
        .modal-header { border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .modal-date { font-size: 0.9em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .modal-uc { font-size: 1.2em; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .modal-prof { font-size: 1em; color: #9c27b0; font-weight: bold; }
        .modal-body { font-size: 1.05em; color: #ddd; line-height: 1.6; white-space: pre-wrap; }
    </style>

            return `${dia}/${mes}/${ano}`;
        }

        function getDiaDaSemana(dataISO) {
            const partes = dataISO.split('-');
            const data = new Date(partes[0], partes[1] - 1, partes[2], 12, 0, 0);
            const dias = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
            return dias[data.getDay()];
        }

        function getStatusAulaPesquisa(dataAula) {
            const agora = new Date();
            const hojeStr = toISODate(agora);
            if (dataAula < hojeStr) return "passada";
            if (dataAula === hojeStr) return agora.getHours() >= 12 ? "passada" : "hoje";
            return "futura";
        }

        // ==========================================
        // Lógica do Modal
        // ==========================================
        function abrirModal(dataISO, ucNome, profNome, numAula) {
            const modal = document.getElementById('modalConteudo');
            
            document.getElementById('modalData').innerText = `${getDiaDaSemana(dataISO)}, ${formatarDataBR(dataISO)}`;
            document.getElementById('modalUC').innerText = `${ucNome} - Aula ${numAula}`;
            document.getElementById('modalProf').innerText = `Prof. ${profNome}`;
            
            const conteudo = conteudosPrevistos[dataISO] || "Conteúdo detalhado a ser definido para esta aula.";
            document.getElementById('modalTexto').innerText = conteudo;

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        }

        function fecharModal(event) {
            if (event.target.id === 'modalConteudo') {
                fecharModalBtn();
            }
        }

        function fecharModalBtn() {
            document.getElementById('modalConteudo').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // ==========================================
        // Lógica Principal da Página
        // ==========================================
        function popularSelect() {
            const select = document.getElementById('filtroUC');
            for (const [codigo, nome] of Object.entries(nomesUC)) {
                const option = document.createElement('option');
                option.value = codigo;
                option.textContent = `${codigo} - ${nome}`;
                select.appendChild(option);
            }
        }

        window.limparBusca = function() {
            document.getElementById('filtroUC').value = "";
            document.getElementById('resultado-pesquisa').style.display = 'none';
            document.getElementById('painel').style.display = 'flex';
            document.getElementById('rodape-semanas').style.display = 'flex';
        }

        document.getElementById('filtroUC').addEventListener('change', function(e) {
            const ucSelecionada = e.target.value;
            const painelGeral = document.getElementById('painel');
            const painelPesquisa = document.getElementById('resultado-pesquisa');
            const rodapeSemanas = document.getElementById('rodape-semanas');

            if (!ucSelecionada) {
                limparBusca();
                return;
            }

            painelGeral.style.display = 'none';
            rodapeSemanas.style.display = 'none';
            painelPesquisa.style.display = 'flex';

            const aulasDaUC = aulas.filter(a => a.codigoUC === ucSelecionada);
            const todasEncerradas = aulasDaUC.every(aula => getStatusAulaPesquisa(aula.data) === "passada");

            let html = `<div class="card" style="border-left-color: #ff9800;">
                            <button onclick="limparBusca()" style="background: none; border: 1px solid #ff9800; color: #ff9800; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-bottom: 15px; font-weight: bold; font-size: 0.9em; display: inline-flex; align-items: center; gap: 5px;">
                                ⬅ Voltar para a Semana
                            </button>
                            <div class="uc-title">${nomesUC[ucSelecionada]}</div>`;
            
            if (todasEncerradas && aulasDaUC.length > 0) {
                html += `<div class="uc-encerrada">✅ UC Encerrada para a Turma 43M</div>`;
            }

            html += `<ul class="lista-aulas">`;
            let encontrouProxima = false;

            aulasDaUC.forEach(aula => {
                const status = getStatusAulaPesquisa(aula.data);
                let liClass = status === "passada" ? "passada" : "";
                let badge = "";

                if ((status === "hoje" || status === "futura") && !encontrouProxima) {
                    liClass = "proxima";
                    badge = status === "hoje" ? `<span class="badge-hoje">🔥 Hoje</span>` : `<span class="badge-proxima">🎯 Próxima Aula</span>`;
                    encontrouProxima = true;
                }

                html += `
                    <li class="${liClass}" onclick="abrirModal('${aula.data}', '${aula.uc}', '${aula.docente}', '${aula.aula}')">
                        <div><span style="font-size: 1.1em; font-weight: bold; color: #fff;">${formatarDataBR(aula.data)}</span> ${badge}</div>
                        <div class="aula-docente">Prof: <strong>${aula.docente}</strong> | Aula ${aula.aula}</div>
                    </li>
                `;
            });

            if (aulasDaUC.length === 0) {
                html += `<li>Nenhuma aula programada para esta UC.</li>`;
            }

            html += `</ul></div>`;
            painelPesquisa.innerHTML = html;
        });

        function mudarSemana(offset) {
            document.getElementById('btn-passada').classList.toggle('active', offset === -1);
            document.getElementById('btn-atual').classList.toggle('active', offset === 0);
            document.getElementById('btn-que-vem').classList.toggle('active', offset === 1);
            renderizarSemana(offset);
        }

        function renderizarSemana(offsetSemanas) {
            const agora = new Date();
            const hojeStr = toISODate(agora);
            const diaDaSemana = agora.getDay();
            const diferencaParaSegunda = (diaDaSemana === 0) ? -6 : 1 - diaDaSemana;
            const diasOffset = offsetSemanas * 7;
            
            const dataSegundaTarget = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate() + diferencaParaSegunda + diasOffset, 12, 0, 0);
            const dataSextaTarget = new Date(dataSegundaTarget.getFullYear(), dataSegundaTarget.getMonth(), dataSegundaTarget.getDate() + 4, 12, 0, 0);

            const strSegunda = toISODate(dataSegundaTarget);
            const strSexta = toISODate(dataSextaTarget);

            const aulasDaSemana = aulas.filter(a => a.data >= strSegunda && a.data <= strSexta);
            
            let titulo = "Aulas desta Semana";
            if (offsetSemanas === -1) titulo = "Aulas da Semana Passada";
            if (offsetSemanas === 1) titulo = "Aulas da Semana Que Vem";

            const painel = document.getElementById('painel');
            let html = `<div class="titulo-semana">${titulo}</div>`;

            if (aulasDaSemana.length === 0) {
                html += `
                <div class="card" style="border-color: #444;">
                    <div class="details" style="text-align: center;">Não há aulas programadas para este período.</div>
                </div>`;
            } else {
                aulasDaSemana.forEach(aula => {
                    const diaNome = getDiaDaSemana(aula.data);
                    
                    let statusHtml, cardClass;
                    if (aula.data === hojeStr) {
                        cardClass = "today";
                        statusHtml = `🔥 Hoje - ${diaNome}`;
                    } else if (aula.data < hojeStr) {
                        cardClass = "past";
                        statusHtml = `✅ Concluída - ${diaNome}`;
                    } else {
                        cardClass = "next";
                        statusHtml = `⏳ Programada - ${diaNome}`;
                    }

                    html += `
                    <div class="card ${cardClass}" onclick="abrirModal('${aula.data}', '${aula.uc}', '${aula.docente}', '${aula.aula}')">
                        <div class="status">${statusHtml}</div>
                        <div class="date">${formatarDataBR(aula.data)}</div>
                        <div class="details">
                            <span class="highlight">${aula.uc}</span><br>
                            Docente: ${aula.docente} | Aula ${aula.aula}
                        </div>
                        <div class="click-hint">🖱️ Clique para ver o planejamento</div>
                    </div>`;
                });
            }

            painel.innerHTML = html;
        }

        popularSelect();
        mudarSemana(0);
    </script>
</body>
</html>
